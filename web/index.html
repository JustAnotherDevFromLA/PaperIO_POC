<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self';">
    <title>Papel.io</title>

    <!-- SEO & Open Graph -->
    <meta name="description"
        content="Play the ultimate HTML5 Paper.io clone. Capture territory, avoid enemies, and dominate the board in this blazing fast web game.">
    <meta property="og:title" content="Paper.io POC">
    <meta property="og:description" content="A highly optimized, seamless web implementation of Paper.io.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://papel.io/assets/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Paper.io POC">
    <meta name="twitter:description" content="Capture the board in this blazing fast HTML5 game.">
    <meta name="twitter:image" content="https://papel.io/assets/og-image.png">
    
    <!-- Icons -->
    <link rel="icon" href="assets/favicon.ico" sizes="any">
    <link rel="icon" href="assets/favicon-32x32.png" type="image/png" sizes="32x32">
    <link rel="icon" href="assets/favicon-16x16.png" type="image/png" sizes="16x16">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preload" href="assets/menu_bg.png" as="image">
    <link rel="preload" href="assets/fireworks.mp3" as="audio">
    <meta name="theme-color" content="#e6e6e6">
    
    <!-- iOS Native App Capabilities -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Papel.io">
</head>

<body>
    <div id="app-container">
        
        <!-- Foreground FX Canvas -->
        <canvas id="fx-canvas" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999;"></canvas>



        <!-- Leaderboard -->
        <div id="leaderboard" class="hidden"></div>

        <!-- Game Board Frame -->
        <div id="canvas-container">
            <!-- Menu Screen -->
            <div id="menu-screen">
                <div class="modal-content-scale">
                    <h1 id="menu-title">Papel.io</h1>

                    <div id="welcome-container">
                        <span class="welcome-text">Welcome</span>
                        <input type="text" id="username-input" maxlength="16" spellcheck="false" autocomplete="off">
                        <span id="width-calc-span"
                            style="visibility:hidden; position:absolute; white-space:nowrap; font-size: 28px; font-weight: 900; padding: 0 2px;"></span>
                        <span class="welcome-text">!</span>
                    </div>

                    <div class="button-group">
                        <button id="start-btn">Start</button>
                        <button id="quit-btn" class="danger-btn">Quit</button>
                    </div>

                    <div id="color-picker">
                        <div class="color-swatch selected" data-color="blue" style="background-color: #007AFF;"></div>
                        <div class="color-swatch" data-color="red" style="background-color: #FF3B30;"></div>
                        <div class="color-swatch" data-color="green" style="background-color: #34C759;"></div>
                        <div class="color-swatch" data-color="yellow" style="background-color: #FFCC00;"></div>
                        <div class="color-swatch" data-color="pink" style="background-color: #FF69B4;"></div>
                        <div class="color-swatch custom-color" data-color="custom" style="background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red); position: relative; overflow: hidden;">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Custom Color Modal -->
            <div id="custom-color-modal" class="hidden">
                <div class="modal-content-scale" style="background: white; padding: 20px; border-radius: 16px; display: flex; flex-direction: column; align-items: center;">
                    <canvas id="color-wheel-canvas" width="200" height="200" style="border-radius: 50%; cursor: crosshair; touch-action: none;"></canvas>
                    <div style="margin-top: 15px; width: 40px; height: 40px; border-radius: 8px; border: 2px solid #ccc;" id="color-wheel-preview"></div>
                    <button id="color-wheel-confirm-btn" style="margin-top: 15px; width: 140px; font-size: 16px; padding: 10px 0;">Confirm</button>
                </div>
            </div>

            <!-- Game Over Screen -->
            <div id="game-over-screen" class="hidden">
                <div class="modal-content-scale">
                    <h1 id="game-over-title">Game Over!</h1>
                    <div id="game-over-leaderboard" style="display: flex; flex-direction: column; gap: 8px; margin: 15px 0; background: rgba(255, 255, 255, 0.5); padding: 15px; border-radius: 12px; width: 100%; max-width: 280px; font-size: 14px;"></div>
                    <div class="button-group">
                        <button id="restart-btn">Restart</button>
                        <button id="quit-to-menu-btn" class="secondary-btn">Quit to Menu</button>
                        <button id="quit-game-btn" class="danger-btn">Quit</button>
                    </div>
                </div>
            </div>

            <!-- Game Canvas -->
            <canvas id="game-canvas" width="800" height="800" class="hidden"></canvas>

            <!-- DOM Overlay Crown -->
            <div id="player-crown" style="position:absolute; pointer-events:none; display:none; z-index: 50;">
                <svg width="24" height="18" viewBox="-9 -14 18 15" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.4));">
                    <path d="M -7,0 L 7,0 L 9,-10 L 3.5,-4 L 0,-13 L -3.5,-4 L -9,-10 Z" fill="#FFCC00"/>
                </svg>
            </div>
            
            <!-- Confirmation Modal -->
            <div id="confirm-modal" class="hidden">
                <div class="modal-content-scale" style="max-width: 240px; padding: 20px;">
                    <h2 style="margin-top: 0; margin-bottom: 20px; font-size: 20px;">Restart Game?</h2>
                    <div style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
                        <button id="confirm-yes-btn" class="danger-btn" style="width: 100%; padding: 10px 0; font-size: 16px;">Restart</button>
                        <button id="confirm-no-btn" class="secondary-btn" style="width: 100%; padding: 10px 0; font-size: 16px;">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Mobile Game Controls -->
        <div id="mobile-controls" class="hidden">
            <button id="mobile-pause-btn" class="mobile-btn">Pause</button>
            <button id="mobile-restart-btn" class="mobile-btn danger-btn">Restart</button>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>

</html>
